---
services:
  parrot:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME}
    hostname: ${HOSTNAME}
    restart:  always
    stdin_open: true   # docker run -i
    tty:        true   # docker run -t
    environment:
      TZ: Asia/Tokyo
    ports:
      - "${SSH_LPORT}:22"
    networks:
      wan_macvlan:
        ipv4_address: 192.168.0.42
      mgmt_bridge:
        ipv4_address: 172.31.0.42
networks:
  wan_macvlan:
    driver: macvlan
    driver_opts:
      parent: wan
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1

  mgmt_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

