volumes:
  couchdb-config:
    name: couchdb-config
  couchdb-certs:
    name: couchdb-certs
  couchdb-data:
    name: couchdb-data

services:
  couchdb:
    image: couchdb:${COUCHDB_VERSION}
    container_name: couchdb
    hostname: couchdb
    #network_mode: host
    network_mode: bridge
    ports:
    - "6984:6984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - couchdb-config:/opt/couchdb/etc/local.d
      - couchdb-certs:/opt/couchdb/etc/certs
      - couchdb-data:/opt/couchdb/data
    env_file:
    - .env

