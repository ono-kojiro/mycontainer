server {
    listen 80;
    server_name _;

    # 認証なしのページ（動作確認用）
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # PAM 認証を要求するページ
    location /couchdb {
	rewrite ^/couchdb/?(.*)$ /$1 break;

        auth_pam "PAM Authentication";
        auth_pam_service_name "nginx";

        # 認証成功時に CouchDB Proxy Auth 用ヘッダを付与
        proxy_set_header X-Auth-CouchDB-UserName $remote_user;
        proxy_set_header X-Auth-CouchDB-Roles "user";
        proxy_set_header X-Auth-CouchDB-Token "static";

        # CouchDB（Docker）の HTTPS に転送
        proxy_pass https://127.0.0.1:6984;

        # 自己署名証明書の場合は検証を無効化
        proxy_ssl_verify off;

        # CouchDB が必要とするヘッダ
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

