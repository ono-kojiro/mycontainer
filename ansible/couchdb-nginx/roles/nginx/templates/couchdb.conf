include /etc/nginx/includes/auth.conf;

rewrite ^/couchdb/(_utils)$ /couchdb/$1/ permanent;
rewrite ^/couchdb$ /couchdb/ permanent;
rewrite ^/couchdb/(.*)$ /$1 break;

#auth_pam "PAM Authentication";
#auth_pam_service_name "nginx";

#set $user $remote_user;

#if ($user = "") {
#  set $user $http_authorization;
#}

proxy_set_header Authorization "Basic YWRtaW46c2VjcmV0";

#proxy_set_header X-Auth-CouchDB-UserName $user;
#proxy_set_header X-Auth-CouchDB-Roles "user";
#proxy_set_header X-Auth-CouchDB-Token "static";

proxy_pass https://localhost:6984/;
proxy_ssl_verify off;

proxy_set_header Host $host;
proxy_http_version 1.1;
proxy_set_header Connection "";
#proxy_read_timeout 86400;

