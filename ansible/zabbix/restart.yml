- name: setup localhost
  hosts:
    - localhost

  #environment:
  #  http_proxy: http://proxy.example.com:8080
  #  https_proxy: http://proxy.example.com:8080

  tasks:
  - name: restart zabbix-server
    ansible.builtin.systemd_service:
      name: zabbix-server
      state: restarted

  - name: restart zabbix-agent
    ansible.builtin.systemd_service:
      name: zabbix-agent
      state: restarted

  - name: restart apache2
    ansible.builtin.systemd_service:
      name: apache2
      state: restarted

