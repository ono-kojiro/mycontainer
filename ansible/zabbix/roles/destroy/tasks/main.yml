---
- name: stop zabbix services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
  loop:
  - zabbix-server
  #- zabbix-agent
  ignore_errors: true

- name: remove zabbix packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    autoremove: yes
    purge: true
  loop:
  - "zabbix-*"
  ignore_errors: true

- name: remove database
  ansible.builtin.shell: |
    mysql -uroot << EOF
    drop database if exists zabbix;
    drop user if exists zabbix@localhost;
    EOF
  ignore_errors: true

- name: remove zabbix log
  ansible.builtin.file:
    path: /var/log/zabbix
    state: absent

- name: remove zabbix config
  ansible.builtin.file:
    path: /etc/zabbix
    state: absent

- name: apt autoremove
  ansible.builtin.apt:
    autoremove: yes

