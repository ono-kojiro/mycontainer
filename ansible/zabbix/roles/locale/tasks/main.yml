---
- name: enable en_US.UTF-8
  ansible.builtin.replace:
    path: /etc/locale.gen
    regexp: '^(# )?en_US.UTF-8 UTF-8'
    replace: 'en_US.UTF-8 UTF-8'

- name: enable ja_JP.UTF-8
  ansible.builtin.replace:
    path: /etc/locale.gen
    regexp: '^(# )?ja_JP.UTF-8 UTF-8'
    replace: 'ja_JP.UTF-8 UTF-8'

- name: locale-gen
  ansible.builtin.shell: |
    locale-gen

 
