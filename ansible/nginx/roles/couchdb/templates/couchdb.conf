location = /couchdb/_utils {
  return 301 /couchdb/_utils/;
}

location ^~ /couchdb/_utils/ {
  include /etc/nginx/includes/auth.conf;
  proxy_pass https://localhost:6984/_utils/;
  include /etc/nginx/includes/couchdb-common.conf;
}

location = /couchdb/mydb {
  return 301 /couchdb/mydb/;
}

location ^~ /couchdb/mydb/ {
  js_content api_key.check;
  proxy_pass https://localhost:6984/mydb/;
  include /etc/nginx/includes/couchdb-common.conf;
}

location = /couchdb {
  return 301 /couchdb/;
}

location = /couchdb/ {
  proxy_pass https://localhost:6984/;
  include /etc/nginx/includes/couchdb-common.conf;
}

location /couchdb {
  include /etc/nginx/includes/auth.conf;
  rewrite ^ $request_uri;
  rewrite ^/couchdb/(.*) /$1 break;
  proxy_pass https://localhost:6984$uri;
  include /etc/nginx/includes/couchdb-common.conf;
}

location /_session {
  include /etc/nginx/includes/auth.conf;
  proxy_pass https://localhost:6984/_session;
  include /etc/nginx/includes/couchdb-common.conf;
}

