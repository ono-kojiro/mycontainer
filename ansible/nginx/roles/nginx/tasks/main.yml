---
- name: install nginx
  ansible.builtin.apt:
    name:
    - nginx
    - nginx-common
    - libnginx-mod-http-auth-pam
    state: present
    update_cache: true

- name: configure /etc/pam.d/nginx
  ansible.builtin.template:
    src: pam-nginx
    dest: /etc/pam.d/nginx

- name: make includes directory
  ansible.builtin.file:
    path: /etc/nginx/includes
    state: directory

- name: configure /etc/nginx/includes/auth.conf
  ansible.builtin.template:
    src: auth.conf
    dest: /etc/nginx/includes/

- name: find enabled-site
  ansible.builtin.find:
    paths: /etc/nginx/sites-enabled/
    recurse: no
    file_type: any
  register: res

- name: remove enabled sites
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ res.files }}"
  when: res.files | length > 0

- name: enable default site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link

- name: restart nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted

