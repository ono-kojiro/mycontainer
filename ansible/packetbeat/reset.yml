- name: reset password of packetbeat
  hosts: elasticsearch

  tasks:
  - name: reset password of beats_system
    ansible.builtin.shell: |
      pass=$(/usr/share/elasticsearch/bin/elasticsearch-reset-password -u beats_system --silent --batch)

      {
        echo "packetbeat_username: beats_system"
        echo "packetbeat_password{{':'}} $pass"
      }  > /tmp/packetbeat_password.yml

      addr={{ ansible_facts.default_ipv4.address }}
      {
        echo "machine $addr"
        echo "login   beats_system"
        echo "password $pass"
      } > /tmp/netrc

    register: res

  - name: fetch packetbeat_password.yml
    ansible.builtin.fetch:
      src: /tmp/packetbeat_password.yml
      dest: "{{ workdir }}/host_vars/packetbeat/packetbeat_password.yml"
      flat: yes
  
  - name: fetch netrc
    ansible.builtin.fetch:
      src: /tmp/netrc
      dest: "{{ workdir }}/.netrc"
      flat: yes

  - name: remove temporary files on remote
    ansible.builtin.file:
      path: "{{ item }}"
      state: absent
    loop:
    - /tmp/packetbeat_password.yml
    - /tmp/netrc

